<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature Converter</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>Temperature Converter</h1>
        <button type="button" class="btn" id="celsBtn">In Celsuis</button>
        <button type="button" class="btn" id="fahrBtn">In Fahrenheit</button>
        <div class="display" id="display"></div>
        <input type="number" id="temp" placeholder="Enter the Temperature">
        <button type="button" class="button" id="submit">Submit</button>
    </div>
    <script src="script.js"></script>
</body>

</html>
