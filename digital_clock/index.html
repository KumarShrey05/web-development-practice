<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Digital Clock</h1>
        <div class="display">00:00:00</div>
        <button type="button" class="time" onclick="startClock()">Time</button>
        <button type="button" class="timer" onclick="startTimer()">Timer</button>
        <button type="button" class="stopwatch" onclick="startStopwatch()">Stopwatch</button>
    </div>
    <script src='script.js'></script>
</body>
</html>
